<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Café SaaS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Fonte moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Biblioteca tsParticles -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
</head>
<body>

<!-- Fundo de partículas -->
<div id="tsparticles" style="position:fixed; inset:0; z-index:-1;"></div>

<!-- LOGIN -->
<div class="login-screen" id="authScreen">
  <div class="login-box">
    <h1>☕ Café SaaS</h1>
    <p class="subtitle">Gerencie seu estoque como uma startup</p>

    <input type="email" id="email" placeholder="Seu email">
    <input type="password" id="senha" placeholder="Sua senha">

    <button class="btn-primary" onclick="login()">Entrar</button>
    <button class="btn-primary" onclick="register()">Criar conta</button>

    <p id="msg"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div class="app hidden" id="appScreen">
  <aside class="sidebar">
    <h2>☕ Café SaaS</h2>
    <nav>
      <button class="nav-link active" onclick="showSection('dashboard')">Dashboard</button>
      <button class="nav-link" onclick="showSection('produtos')">Produtos</button>
      <button class="nav-link" onclick="logout()">Sair</button>
    </nav>
  </aside>

  <main class="main">
    <!-- DASHBOARD -->
    <section id="dashboard" class="section active">
      <h1>Dashboard</h1>
      <div class="cards">
        <div class="card">
          <p>Total de Produtos</p>
          <h2 id="totalProdutos">0</h2>
        </div>
        <div class="card">
          <p>Estoque Total</p>
          <h2 id="totalEstoque">0</h2>
        </div>
      </div>
    </section>

    <!-- PRODUTOS -->
    <section id="produtos" class="section">
      <h1>Produtos</h1>
      <div class="form">
        <input id="nome" placeholder="Nome do produto">
        <input id="preco" type="number" placeholder="Preço">
        <input id="quantidade" type="number" placeholder="Quantidade">
        <button class="btn-primary" onclick="addProduto()">Adicionar</button>
      </div>
      <ul id="lista" class="lista"></ul>
    </section>
  </main>
</div>

<!-- JS -->
<script src="js/script.js"></script>
<script>
/* 🔥 CONTROLE DE TELAS E PARTICULAS */
window.onload = () => {
  const token = localStorage.getItem("token");
  if (token) {
    document.getElementById("authScreen").classList.add("hidden");
    document.getElementById("appScreen").classList.remove("hidden");
    loadDashboard();
    loadProdutos();
  }

  // Inicializa partículas
  tsParticles.load("tsparticles", {
    particles: {
      number: { value: 80, density: { enable: true, value_area: 800 } },
      color: { value: "#6366f1" },
      shape: { type: "circle" },
      opacity: { value: 0.5, random: true },
      size: { value: 3, random: true },
      move: { enable: true, speed: 1, direction: "none", out_mode: "out" },
      line_linked: { enable: true, distance: 150, color: "#6366f1", opacity: 0.4, width: 1 }
    },
    interactivity: {
      detect_on: "canvas",
      events: {
        onhover: { enable: true, mode: "repulse" },
        onclick: { enable: true, mode: "push" }
      },
      modes: {
        repulse: { distance: 100 },
        push: { particles_nb: 4 }
      }
    },
    retina_detect: true
  });
};

function showSection(section) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(section).classList.add("active");

  document.querySelectorAll(".nav-link").forEach(btn => btn.classList.remove("active"));
  document.querySelector(`button[onclick="showSection('${section}')"]`).classList.add("active");
}
</script>
</body>
</html>
