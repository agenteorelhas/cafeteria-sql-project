<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>☕ Café SaaS - O Estoque da Startup Moderna</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-screen" id="authScreen">
  <div class="login-box">
    <h1>☕ Café SaaS</h1>
    <p class="subtitle">Gerencie seu estoque como uma startup</p>

    <input type="email" id="email" placeholder="Seu email">
    <input type="password" id="senha" placeholder="Sua senha">

    <button class="btn-primary" onclick="login()">Entrar</button>
    <button class="btn-primary" onclick="register()">Criar conta</button>

    <p id="msg"></p>
  </div>
</div>

<div class="app hidden" id="appScreen">
  <aside class="sidebar">
    <h2>☕ Café SaaS</h2>
    <nav>
      <button class="nav-link active" onclick="showSection('dashboard')">
        <i>📊</i> Dashboard
      </button>
      <button class="nav-link" onclick="showSection('produtos')">
        <i>☕</i> Produtos
      </button>
      <button class="nav-link" onclick="logout()">
        <i>🚪</i> Sair
      </button>
    </nav>
  </aside>

  <main class="main">
    <section id="dashboard" class="section active">
      <h1>Dashboard</h1>
      <div class="cards">
        <div class="card" id="totalProdutosCard">
          <p>Total de Produtos</p>
          <h2 id="totalProdutos">0</h2>
        </div>
        <div class="card" id="totalEstoqueCard">
          <p>Itens no Estoque</p>
          <h2 id="totalEstoque">0</h2>
        </div>
      </div>
    </section>

    <section id="produtos" class="section">
      <h1>Gerenciamento de Produtos</h1>
      <div class="form">
        <input id="nome" placeholder="Nome do produto">
        <input id="preco" type="number" step="0.01" placeholder="Preço (R$)">
        <input id="quantidade" type="number" placeholder="Quantidade">
        <button class="btn-primary" onclick="addProduto()">Adicionar</button>
      </div>

      <div class="produtos-table-container">
        <table class="lista">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Preço</th>
              <th>Quantidade</th>
              </tr>
          </thead>
          <tbody id="lista">
            </tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<script src="js/script.js"></script>
<script>
/* 🔥 CONTROLE DE TELAS (Mantido o comportamento original) */
window.onload = () => {
  const token = localStorage.getItem("token");
  if (token) {
    document.getElementById("authScreen").classList.add("hidden");
    document.getElementById("appScreen").classList.remove("hidden");
    loadDashboard();
    loadProdutos();
  }
};

function showSection(section) {
  // Ocultar todas as seções
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  // Mostrar a seção atual
  document.getElementById(section).classList.add("active");

  // Atualizar estilo do botão da sidebar
  document.querySelectorAll(".nav-link").forEach(btn => btn.classList.remove("active"));
  document.querySelector(`button[onclick="showSection('${section}')"]`).classList.add("active");
}
</script>
</body>
</html>
