<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Café SaaS | Gestão</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="login-screen" id="authScreen">
    <div class="login-box">
        <h1>☕ Café SaaS</h1>
        <p class="subtitle">Gerencie seu estoque como uma startup</p>
        <div class="auth-inputs">
            <input type="email" id="email" placeholder="Seu email">
            <input type="password" id="senha" placeholder="Sua senha">
        </div>
        <button class="btn-primary" onclick="login()">Entrar</button>
        <button class="btn-secondary" onclick="register()">Criar conta</button>
        <p id="msg"></p>
    </div>
</div>

<div class="app hidden" id="appScreen">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="logo-text">Café SaaS</h2>
            <button id="toggleSidebar" onclick="toggleSidebar()">☰</button>
        </div>
        <nav>
            <button class="nav-link active" id="nav-dashboard" onclick="showSection('dashboard')">
                <span class="icon">📈</span> <span class="nav-text">Dashboard</span>
            </button>
            <button class="nav-link" id="nav-produtos" onclick="showSection('produtos')">
                <span class="icon">📦</span> <span class="nav-text">Produtos</span>
            </button>
            <button class="nav-link logout-btn" onclick="logout()">
                <span class="icon">🚪</span> <span class="nav-text">Sair</span>
            </button>
        </nav>
    </aside>

    <main class="main">
        <section id="dashboard" class="section active">
            <h1>Visão Geral</h1>
            <div class="cards">
                <div class="card mini-card centered-content">
                    <p>Variedade de Itens</p>
                    <h2 id="totalProdutos">0</h2>
                </div>
                <div class="card mini-card card-gauge">
                    <p>Capacidade do Estoque</p>
                    <div class="gauge-container">
                        <canvas id="gaugeChart"></canvas>
                        <div class="gauge-value">
                            <h2 id="totalEstoque">0</h2>
                            <span>unid.</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="produtos" class="section">
            <h1>Inventário</h1>
            <div class="form">
                <input id="nome" placeholder="Nome do Produto">
                <input id="preco" type="number" step="0.01" placeholder="Preço (R$)">
                <input id="quantidade" type="number" placeholder="Qtd">
                <button class="btn-primary" onclick="addProduto()">Adicionar</button>
            </div>
            <div class="produtos-table-container">
                <table class="lista-table">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th class="txt-right">Preço</th>
                            <th class="txt-right">Qtd</th>
                        </tr>
                    </thead>
                    <tbody id="lista"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="js/script.js"></script>
</body>
</html>
