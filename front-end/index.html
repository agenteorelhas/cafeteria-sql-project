<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>☕ Café SaaS - Sistema de Inventário</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="login-screen" id="authScreen">
  <div class="login-box">
    <h1>☕ Café SaaS</h1>
    <p class="subtitle">Gerencie seu estoque com elegância</p>
    <div class="auth-inputs">
        <input type="email" id="email" placeholder="Email de acesso">
        <input type="password" id="senha" placeholder="Sua senha">
    </div>
    <button class="btn-primary" onclick="login()">Acessar Painel</button>
    <button class="btn-ghost" onclick="register()">Criar nova conta</button>
    <p id="msg"></p>
  </div>
</div>

<div class="app hidden" id="appScreen">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2 class="logo-text">Café SaaS</h2>
      <button id="toggleSidebar" onclick="toggleSidebar()">☰</button>
    </div>
    
    <nav>
      <button class="nav-link active" onclick="showSection('dashboard')">
        <span class="icon">📈</span> <span class="nav-text">Dashboard</span>
      </button>
      <button class="nav-link" onclick="showSection('produtos')">
        <span class="icon">📦</span> <span class="nav-text">Produtos</span>
      </button>
      <button class="nav-link logout-btn" onclick="logout()">
        <span class="icon">🚪</span> <span class="nav-text">Sair</span>
      </button>
    </nav>
  </aside>

  <main class="main">
    <section id="dashboard" class="section active">
      <h1>Dashboard</h1>
      <div class="cards">
        <div class="card">
          <p>Variedade de Itens</p>
          <h2 id="totalProdutos">0</h2>
        </div>
        <div class="card">
          <p>Volume em Estoque</p>
          <h2 id="totalEstoque">0</h2>
        </div>
      </div>
    </section>

    <section id="produtos" class="section">
      <h1>Inventário</h1>
      <div class="form">
        <input id="nome" placeholder="Nome do Produto">
        <input id="preco" type="number" step="0.01" placeholder="Preço (R$)">
        <input id="quantidade" type="number" placeholder="Qtd">
        <button class="btn-primary" onclick="addProduto()">Adicionar</button>
      </div>

      <div class="produtos-table-container">
        <table class="lista">
          <thead>
            <tr>
              <th>Produto</th>
              <th class="txt-right">Preço</th>
              <th class="txt-right">Qtd</th>
              <th class="txt-center">Ações</th>
            </tr>
          </thead>
          <tbody id="lista"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<script src="js/script.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        initParticles(); 
        const token = localStorage.getItem("token");
        if (token) {
            document.getElementById("authScreen").classList.add("hidden");
            document.getElementById("appScreen").classList.remove("hidden");
            loadDashboard();
            loadProdutos();
        }
    });

    function showSection(sectionId) {
        document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".nav-link").forEach(btn => btn.classList.remove("active"));
        const target = document.getElementById(sectionId);
        if (target) {
            target.classList.add("active");
            const btn = document.querySelector(`button[onclick="showSection('${sectionId}')"]`);
            if (btn) btn.classList.add("active");
        }
    }
</script>
</body>
</html>
