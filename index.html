<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café SaaS</title>

<link rel="stylesheet" href="front-end/css/style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
    <div class="login-box">
        <h2>Café SaaS ☕</h2>

        <input id="login-user" placeholder="Email">
        <input id="login-pass" type="password" placeholder="Senha">

        <button id="btn-login">Entrar</button>

        <p style="text-align:center; font-size:12px;">
            Não tem conta?
            <a href="#" onclick="toggleRegister()">Criar conta</a>
        </p>
    </div>
</div>

<!-- APP -->
<div class="app hidden">

    <aside class="sidebar">
        <h2>☕ Café</h2>
        <a class="nav-link active" data-target="dashboard">Dashboard</a>
        <a class="nav-link" data-target="produtos">Produtos</a>
        <button onclick="logout()">Sair</button>
    </aside>

    <main class="main">

        <section id="dashboard" class="view active">
            <h1>Dashboard</h1>
            <p>Total Produtos: <span id="dash-produtos">0</span></p>
            <p>Total Estoque: <span id="dash-estoque">0</span></p>
        </section>

        <section id="produtos" class="view">
            <h1>Produtos</h1>
            <button onclick="salvarProduto()">+ Novo</button>
            <table>
                <thead>
                    <tr><th>ID</th><th>Nome</th><th>Preço</th><th>Qtd</th></tr>
                </thead>
                <tbody id="lista-produtos"></tbody>
            </table>
        </section>

    </main>
</div>

<script src="front-end/Script.js"></script>
</body>
</html>
