<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafeteria Admin | Dashboard</title>
    <link rel="stylesheet" href="front-end/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <h2>Café Admin</h2>
        <ul class="nav-menu">
            <li><a href="#dashboard" class="nav-link active">Dashboard</a></li>
            <li><a href="#produtos" class="nav-link">Produtos</a></li>
            <li><a href="#estoque" class="nav-link">Estoque</a></li>
            <li><a href="#logs" class="nav-link">Logs SQL</a></li>
        </ul>
    </nav>

    <main class="content">
        <header class="main-header glass">
            <div class="header-left">
                <h1>Sistema de Gestão</h1>
                <div class="system-badges">
                    <span class="badge">SQL Connected</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="search-bar">
                    <input type="text" placeholder="Buscar..." id="input-busca">
                </div>
                <button id="btn-novo-produto" class="btn-main">+ Novo Item</button>
            </div>
        </header>

        <div id="view-dashboard" class="content-view">
            <section class="cards-grid">
                <div class="card"><h3>Vendas Hoje</h3><p>R$ 1.250,00</p></div>
                <div class="card alert"><h3>Alertas</h3><p>2 Críticos</p></div>
                <div class="card"><h3>Database</h3><p style="color: #2ecc71;">Ativo</p></div>
            </section>
        </div>

        <div id="view-produtos" class="content-view" style="display: none;">
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Produto</th><th>Preço</th><th>Status</th></tr>
                    </thead>
                    <tbody id="lista-produtos"></tbody>
                </table>
            </div>
        </div>

        <div id="view-estoque" class="content-view" style="display: none;">
            <div class="gauges-grid">
                <div class="gauge-card" id="card-cafe">
                    <h3>Grãos de Café</h3>
                    <div class="gauge">
                        <div class="gauge__body">
                            <div class="gauge__fill" id="gauge-cafe-fill"></div>
                            <div class="gauge__cover"></div>
                        </div>
                        <div class="gauge__needle" id="gauge-cafe-needle"></div>
                    </div>
                    <span id="gauge-cafe-text">0%</span>
                </div>
            </div>
        </div>

        <div id="view-logs" class="content-view" style="display: none;">
            <div class="log-terminal" id="log-terminal">
                <code>[SQL] Sistema carregado com sucesso...</code>
            </div>
        </div>
    </main>

    <script src="front-end/Script.js"></script>
</body>
</html>
