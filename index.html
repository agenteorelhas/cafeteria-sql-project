<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café SaaS</title>

<link rel="stylesheet" href="front-end/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div id="login-screen" class="login-screen">
    <div class="login-box">
        <h2>Café SaaS ☕</h2>
        <input id="login-user" placeholder="Email">
        <input id="login-pass" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<div class="app hidden">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">☕ Café</div>

        <nav>
            <a class="nav-link active" data-target="dashboard">Dashboard</a>
            <a class="nav-link" data-target="produtos">Produtos</a>
            <a class="nav-link" data-target="logs">Logs</a>
        </nav>

        <div class="sidebar-footer">
            <button onclick="logout()">Sair</button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <header class="topbar">
            <h1 id="page-title">Dashboard</h1>
            <button class="btn-primary" onclick="openModal()">+ Novo</button>
        </header>

        <!-- DASHBOARD -->
        <section id="dashboard" class="view active">
            <div class="cards">
                <div class="card">
                    <span>Produtos</span>
                    <h2 id="dash-produtos">0</h2>
                </div>
                <div class="card">
                    <span>Estoque</span>
                    <h2 id="dash-estoque">0</h2>
                </div>
            </div>
        </section>

        <!-- PRODUTOS -->
        <section id="produtos" class="view">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Preço</th>
                            <th>Qtd</th>
                        </tr>
                    </thead>
                    <tbody id="lista-produtos"></tbody>
                </table>
            </div>
        </section>

        <!-- LOGS -->
        <section id="logs" class="view">
            <div id="log-terminal"></div>
        </section>

    </main>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <h3>Novo Produto</h3>
        <input id="nome" placeholder="Nome">
        <input id="preco" placeholder="Preço">
        <input id="quantidade" placeholder="Quantidade">
        <button class="btn-primary" onclick="salvarProduto()">Salvar</button>
    </div>
</div>

<script src="front-end/Script.js"></script>
</body>
</html>
