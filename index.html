<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Admin Pro</title>

<link rel="stylesheet" href="front-end/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
    <div class="login-box">
        <h2>Café Admin ☕</h2>
        <input id="login-user" placeholder="Usuário">
        <input id="login-pass" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<div class="app hidden">

    <aside class="sidebar">
        <h2>☕ Café</h2>
        <a class="nav-link active" data-target="dashboard">Dashboard</a>
        <a class="nav-link" data-target="produtos">Produtos</a>
        <a class="nav-link" data-target="logs">Logs</a>
    </aside>

    <main class="main">

        <header class="topbar">
            <h1 id="page-title">Dashboard</h1>
            <button onclick="logout()">Sair</button>
        </header>

        <!-- DASHBOARD -->
        <section id="dashboard" class="view active">
            <div class="cards">
                <div class="card">
                    <h3>Produtos</h3>
                    <p id="dash-produtos">0</p>
                </div>
                <div class="card">
                    <h3>Estoque</h3>
                    <p id="dash-estoque">0</p>
                </div>
            </div>

            <canvas id="chart"></canvas>
        </section>

        <!-- PRODUTOS -->
        <section id="produtos" class="view">
            <button onclick="openModal()">+ Novo</button>
            <table>
                <thead>
                    <tr><th>ID</th><th>Nome</th><th>Preço</th><th>Qtd</th></tr>
                </thead>
                <tbody id="lista-produtos"></tbody>
            </table>
        </section>

        <!-- LOGS -->
        <section id="logs" class="view">
            <div id="log-terminal"></div>
        </section>

    </main>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <input id="nome" placeholder="Nome">
        <input id="preco" placeholder="Preço">
        <input id="quantidade" placeholder="Quantidade">
        <button onclick="salvarProduto()">Salvar</button>
    </div>
</div>

<script src="front-end/Script.js"></script>
</body>
</html>
