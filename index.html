<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Café Admin</title>
<link rel="stylesheet" href="front-end/css/style.css">
</head>

<body>

<nav class="sidebar">
    <h2>CAFÉ ADMIN</h2>
    <a href="#" class="nav-link active" data-target="view-dashboard">Dashboard</a>
    <a href="#" class="nav-link" data-target="view-produtos">Produtos</a>
    <a href="#" class="nav-link" data-target="view-logs">Logs</a>
    <a href="#" class="nav-link" data-target="view-comentarios">Comentários</a>
</nav>

<main class="content">

<header class="main-header">
    <h1>Painel</h1>
    <button id="btn-novo-produto">+ Novo</button>
</header>

<!-- DASHBOARD -->
<div id="view-dashboard" class="content-view active">
    <div class="cards-grid">
        <div class="card">
            <h3>Total Produtos</h3>
            <p id="dash-produtos">0</p>
        </div>
        <div class="card">
            <h3>Estoque Total</h3>
            <p id="dash-estoque">0</p>
        </div>
    </div>
</div>

<!-- PRODUTOS -->
<div id="view-produtos" class="content-view">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Preço</th>
                <th>Qtd</th>
            </tr>
        </thead>
        <tbody id="lista-produtos"></tbody>
    </table>
</div>

<!-- LOGS -->
<div id="view-logs" class="content-view">
    <div id="log-terminal"></div>
</div>

<!-- COMENTÁRIOS -->
<div id="view-comentarios" class="content-view">
    <div class="comentarios">
        <input id="comentario-input" placeholder="Digite um comentário">
        <button onclick="enviarComentario()">Enviar</button>
        <div id="lista-comentarios"></div>
    </div>
</div>

</main>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <input id="nome" placeholder="Nome">
        <input id="preco" placeholder="Preço">
        <input id="quantidade" placeholder="Quantidade">
        <input type="file" id="imagem">
        <button onclick="salvarProduto()">Salvar</button>
    </div>
</div>

<script src="front-end/Script.js"></script>
</body>
</html>
