<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Admin Pro</title>
<link rel="stylesheet" href="front-end/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>☕ Café Admin</h2>
        <nav>
            <a class="nav-link active" data-target="dashboard">Dashboard</a>
            <a class="nav-link" data-target="produtos">Produtos</a>
            <a class="nav-link" data-target="logs">Logs</a>
            <a class="nav-link" data-target="comentarios">Comentários</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <header class="topbar">
            <h1 id="page-title">Dashboard</h1>
            <button id="btn-novo-produto">+ Novo Produto</button>
        </header>

        <!-- DASHBOARD -->
        <section id="dashboard" class="view active">
            <div class="cards">
                <div class="card">
                    <h3>Total Produtos</h3>
                    <p id="dash-produtos">0</p>
                </div>
                <div class="card">
                    <h3>Total Estoque</h3>
                    <p id="dash-estoque">0</p>
                </div>
            </div>
        </section>

        <!-- PRODUTOS -->
        <section id="produtos" class="view">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Preço</th>
                            <th>Qtd</th>
                        </tr>
                    </thead>
                    <tbody id="lista-produtos"></tbody>
                </table>
            </div>
        </section>

        <!-- LOGS -->
        <section id="logs" class="view">
            <div class="logs" id="log-terminal"></div>
        </section>

        <!-- COMENTÁRIOS -->
        <section id="comentarios" class="view">
            <div class="comentarios-box">
                <input id="comentario-input" placeholder="Digite um comentário...">
                <button onclick="enviarComentario()">Enviar</button>
                <div id="lista-comentarios"></div>
            </div>
        </section>

    </main>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <h2>Novo Produto</h2>
        <input id="nome" placeholder="Nome">
        <input id="preco" placeholder="Preço">
        <input id="quantidade" placeholder="Quantidade">
        <input type="file" id="imagem">
        <button onclick="salvarProduto()">Salvar</button>
    </div>
</div>

<script src="front-end/Script.js"></script>
</body>
</html>
