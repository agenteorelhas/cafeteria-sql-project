<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafeteria Admin | Espresso Neon</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/parakeet-line/48/D2B48C/coffee-to-go.png">
    <link rel="stylesheet" href="front-end/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-js"></div>

    <nav class="sidebar">
        <div class="sidebar-logo"><h2>CAFÉ ADMIN</h2></div>
        <ul class="nav-menu">
            <li><a href="#dashboard" class="nav-link active" data-target="view-dashboard">Dashboard</a></li>
            <li><a href="#produtos" class="nav-link" data-target="view-produtos">Produtos</a></li>
            <li><a href="#estoque" class="nav-link" data-target="view-estoque">Estoque</a></li>
            <li><a href="#logs" class="nav-link" data-target="view-logs">Logs SQL</a></li>
        </ul>
    </nav>

    <main class="content">
        <header class="main-header glass">
            <div class="header-info">
                <h1>Painel de Gestão</h1>
                <span class="badge">SQL Server Ativo</span>
            </div>
            <button id="btn-novo-produto" class="btn-main">+ Novo Item</button>
        </header>

        <div id="view-dashboard" class="content-view active">
            <div class="cards-grid">
                <div class="card"><h3>Vendas Hoje</h3><p>R$ 1.250,00</p></div>
                <div class="card critico"><h3>Alertas</h3><p>2 Críticos</p></div>
                <div class="card"><h3>Database</h3><p style="color:#50fa7b">Estável</p></div>
            </div>
        </div>

        <div id="view-estoque" class="content-view">
            <div class="gauge-container glass">
                <h3>Nível de Grãos de Café</h3>
                <div class="gauge">
                    <div class="gauge__body">
                        <div class="gauge__fill" id="gauge-fill"></div>
                        <div class="gauge__cover"></div>
                    </div>
                    <div class="gauge__needle" id="gauge-needle"></div>
                </div>
                <div class="gauge-value" id="gauge-text">0%</div>
            </div>
        </div>

        <div id="view-logs" class="content-view">
            <div class="log-terminal glass" id="log-terminal">
                <code>[SQL] Aguardando operações...</code>
            </div>
        </div>
    </main>

    <div id="modal-container" class="modal-overlay">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Novo Registro SQL</h2>
                <button id="close-modal" class="btn-close">&times;</button>
            </div>
            <form id="form-novo-item">
                <div class="input-group"><label>Nome</label><input type="text" id="nome-item" required></div>
                <div class="input-row">
                    <div class="input-group"><label>Preço</label><input type="number" id="preco-item" step="0.01" required></div>
                    <div class="input-group"><label>Qtd</label><input type="number" id="qtd-item" required></div>
                </div>
                <button type="submit" class="btn-main btn-full">Salvar no Banco</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="front-end/Script.js"></script>
</body>
</html>
