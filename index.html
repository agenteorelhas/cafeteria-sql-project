<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafeteria Admin | SQL Dashboard</title>
    <link rel="stylesheet" href="front-end/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <h2>Café Admin</h2>
        <ul class="nav-menu">
            <li><a href="#dashboard" class="nav-link active">Dashboard</a></li>
            <li><a href="#produtos" class="nav-link">Produtos</a></li>
            <li><a href="#estoque" class="nav-link">Estoque</a></li>
            <li><a href="#logs" class="nav-link">Logs SQL</a></li>
        </ul>
    </nav>

    <main class="content">
        <header class="main-header glass">
            <div class="header-left">
                <h1>Painel de Controle</h1>
                <div class="system-badges">
                    <span class="badge"><i class="dot"></i> SQL Connected</span>
                    <span class="badge"><i class="dot"></i> Triggers Active</span>
                </div>
            </div>
            
            <div class="header-actions">
                <div class="search-bar">
                    <input type="text" placeholder="Buscar produto ou ID..." id="input-busca">
                </div>
                <button id="btn-novo-produto" class="btn-main shadow-hover">+ Novo Item</button>
            </div>
        </header>

        <section id="dashboard" class="cards-grid">
            <div class="card">
                <h3>Total em Vendas</h3>
                <p>R$ 1.250,00</p>
            </div>
            <div class="card alert">
                <h3>Itens em Alerta</h3>
                <p>2 Produtos</p>
            </div>
            <div class="card">
                <h3>Database Status</h3>
                <p style="font-size: 1rem; color: var(--success);">Sync OK</p>
            </div>
        </section>

        <section id="produtos" class="table-container">
            <h2>Gerenciamento de Produtos</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Produto</th>
                        <th>Preço</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-produtos">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="front-end/Script.js"></script>
</body>
</html>
