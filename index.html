<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafeteria Admin | Espresso Neon</title>
    <link rel="stylesheet" href="front-end/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-js"></div>

    <nav class="sidebar">
        <div class="sidebar-logo">
            <h2>CAFÉ ADMIN</h2>
        </div>
        <ul class="nav-menu">
            <li><a href="#dashboard" class="nav-link active" data-target="view-dashboard">Dashboard</a></li>
            <li><a href="#produtos" class="nav-link" data-target="view-produtos">Produtos</a></li>
            <li><a href="#estoque" class="nav-link" data-target="view-estoque">Estoque</a></li>
            <li><a href="#logs" class="nav-link" data-target="view-logs">Logs SQL</a></li>
        </ul>
    </nav>

    <main class="content">
        <header class="main-header glass">
            <div class="header-info">
                <h1>Painel de Gestão</h1>
                <span class="badge">SQL Online</span>
            </div>
            <div class="header-actions">
                <input type="text" placeholder="Filtrar registros..." class="search-input">
                <button id="btn-novo-produto" class="btn-main">+ Novo Item</button>
            </div>
        </header>

        <div id="view-dashboard" class="content-view active">
            <div class="cards-grid">
                <div class="card"><h3>Vendas Hoje</h3><p>R$ 1.250,00</p></div>
                <div class="card critico"><h3>Alertas</h3><p>2 Itens Críticos</p></div>
                <div class="card"><h3>Latência DB</h3><p>12ms</p></div>
            </div>
        </div>

        <div id="view-produtos" class="content-view">
            <div class="table-container glass">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Produto</th><th>Preço</th><th>Status</th></tr>
                    </thead>
                    <tbody id="lista-produtos">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="view-estoque" class="content-view">
            <div class="gauge-container glass">
                <h3>Grãos de Café</h3>
                <div class="gauge">
                    <div class="gauge__body">
                        <div class="gauge__fill" id="gauge-fill"></div>
                        <div class="gauge__cover"></div>
                    </div>
                    <div class="gauge__needle" id="gauge-needle"></div>
                </div>
                <div class="gauge-value" id="gauge-text">0%</div>
            </div>
        </div>

        <div id="view-logs" class="content-view">
            <div class="log-terminal glass">
                <code>[SQL] Conexão estabelecida...</code>
            </div>
        </div>
    </main>

    <div id="modal-container" class="modal-overlay">
        </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="front-end/Script.js"></script>
</body>
</html>
